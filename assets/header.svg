<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rudraksh Bharti — AI Automation Engineer, Founder of ASTITWA AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160F08"/>
      <stop offset="0.55" stop-color="#241608"/>
      <stop offset="1" stop-color="#3A2408"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#D97706"/>
      <stop offset="50%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D97706"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#92400E" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#92400E" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="260" rx="18" fill="url(#bg)"/>

  <!-- ambient glow -->
  <ellipse cx="600" cy="135" rx="520" ry="160" fill="url(#glow)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- faint dotted grid accent -->
  <g fill="#FBBF24" opacity="0.10">
    <circle cx="70" cy="60" r="2"/><circle cx="110" cy="60" r="2"/><circle cx="150" cy="60" r="2"/>
    <circle cx="70" cy="100" r="2"/><circle cx="110" cy="100" r="2"/><circle cx="150" cy="100" r="2"/>
    <circle cx="1130" cy="200" r="2"/><circle cx="1090" cy="200" r="2"/><circle cx="1050" cy="200" r="2"/>
    <circle cx="1130" cy="160" r="2"/><circle cx="1090" cy="160" r="2"/><circle cx="1050" cy="160" r="2"/>
  </g>

  <!-- eyebrow -->
  <text x="600" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="8" fill="#A98D6B">ASTITWA&#160;AI&#160;&#8226;&#160;FOUNDER&#160;&#38;&#160;AI&#160;ENGINEER</text>

  <!-- name -->
  <text x="600" y="138" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="2" fill="url(#title)">RUDRAKSH BHARTI</text>

  <!-- divider -->
  <rect x="350" y="158" width="500" height="2" fill="url(#rule)"/>

  <!-- subtitle -->
  <text x="600" y="192" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#FBBF24">AI Automation Engineer &#183; Generative AI &#183; Full-Stack Builder</text>

  <!-- tagline -->
  <text x="600" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="3" fill="#E8D6BE" opacity="0.85">Agents &#160;&#8226;&#160; Voice AI &#160;&#8226;&#160; n8n &#160;&#8226;&#160; APIs &#160;&#8226;&#160; $14K+ Delivered</text>
</svg>
