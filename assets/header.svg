<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rudraksh Bharti — AI Automation Engineer, Founder of ASTITWA AI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160F08"/>
      <stop offset="0.55" stop-color="#241608"/>
      <stop offset="1" stop-color="#3A2408"/>
    </linearGradient>

    <!-- animated sweeping shimmer across the title -->
    <linearGradient id="title" x1="0%" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="40%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#FFFBEB"/>
      <stop offset="60%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#B45309"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#92400E" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#92400E" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>

    <!-- moving light sweep over the whole card -->
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFF3D6" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="round"><rect width="1200" height="260" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="260" fill="url(#bg)"/>

    <!-- ambient glow (breathing) -->
    <ellipse cx="600" cy="135" rx="520" ry="160" fill="url(#glow)">
      <animate attributeName="opacity" values="0.55;1;0.55" dur="5s" repeatCount="indefinite"/>
    </ellipse>

    <!-- diagonal light sweep -->
    <rect x="-360" y="-40" width="240" height="340" fill="url(#shine)" transform="skewX(-18)">
      <animate attributeName="x" from="-360" to="1320" dur="4.5s" begin="0.8s" repeatCount="indefinite"/>
    </rect>

    <!-- twinkling dot grid accents -->
    <g fill="#FBBF24">
      <g opacity="0.12"><animate attributeName="opacity" values="0.05;0.22;0.05" dur="3s" repeatCount="indefinite"/>
        <circle cx="70" cy="60" r="2"/><circle cx="110" cy="60" r="2"/><circle cx="150" cy="60" r="2"/>
        <circle cx="70" cy="100" r="2"/><circle cx="110" cy="100" r="2"/><circle cx="150" cy="100" r="2"/>
      </g>
      <g opacity="0.12"><animate attributeName="opacity" values="0.22;0.05;0.22" dur="3s" repeatCount="indefinite"/>
        <circle cx="1130" cy="200" r="2"/><circle cx="1090" cy="200" r="2"/><circle cx="1050" cy="200" r="2"/>
        <circle cx="1130" cy="160" r="2"/><circle cx="1090" cy="160" r="2"/><circle cx="1050" cy="160" r="2"/>
      </g>
    </g>

    <!-- top accent line with a travelling highlight -->
    <rect x="0" y="0" width="1200" height="3" fill="#3A2408"/>
    <rect x="-200" y="0" width="200" height="3" fill="url(#rule)">
      <animate attributeName="x" from="-200" to="1200" dur="4.5s" repeatCount="indefinite"/>
    </rect>

    <!-- eyebrow -->
    <text x="600" y="74" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" letter-spacing="8" fill="#A98D6B">ASTITWA&#160;AI&#160;&#8226;&#160;FOUNDER&#160;&#38;&#160;AI&#160;ENGINEER</text>

    <!-- name (animated gold shimmer) -->
    <text x="600" y="138" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62" font-weight="800" letter-spacing="2" fill="url(#title)">RUDRAKSH BHARTI</text>

    <!-- divider (pulsing) -->
    <rect x="350" y="158" width="500" height="2" fill="url(#rule)">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- subtitle -->
    <text x="600" y="192" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="600" fill="#FBBF24">AI Automation Engineer &#183; Generative AI &#183; Full-Stack Builder</text>

    <!-- tagline + blinking cursor -->
    <text x="588" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="3" fill="#E8D6BE" opacity="0.9">Agents &#160;&#8226;&#160; Voice AI &#160;&#8226;&#160; n8n &#160;&#8226;&#160; APIs &#160;&#8226;&#160; $14K+ Delivered</text>
    <rect x="966" y="211" width="9" height="15" fill="#FBBF24">
      <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
