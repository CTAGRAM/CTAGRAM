name: GitHub Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Uses a PAT named METRICS_TOKEN if you add one (enables private stats),
          # otherwise falls back to the built-in GITHUB_TOKEN (public stats).
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: CTAGRAM
          filename: github-metrics.svg
          template: classic
          # Only header + activity shown: with the built-in GITHUB_TOKEN, the
          # repositories/community counters can only see THIS repo (would wrongly
          # show "1 repository / 0 stars"). Add a METRICS_TOKEN PAT to safely
          # re-enable: base: header, activity, community, repositories, metadata
          base: header, activity, metadata
          config_timezone: Asia/Kolkata
          config_order: base.header, isocalendar, base.activity

          # isocalendar = the isometric 3D contribution calendar (works on the
          # built-in GITHUB_TOKEN). languages/habits are intentionally omitted —
          # they require a personal access token (METRICS_TOKEN). Add that secret
          # and re-enable them for an even richer card.
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Warm bronze accents that stay readable in BOTH GitHub light & dark mode.
          extras_css: |
            h1, h2, h3 { color:#B45309 !important; }
            .field svg, h1 svg, h2 svg, h3 svg { fill:#D97706 !important; }
            a { color:#B45309 !important; }
