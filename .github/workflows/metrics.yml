name: GitHub Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          # Uses a PAT named METRICS_TOKEN if you add one (enables private stats),
          # otherwise falls back to the built-in GITHUB_TOKEN (public stats).
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: CTAGRAM
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_order: base.header, isocalendar, languages, habits, base.activity, base.community, base.repositories

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Warm luxury theme (card is HTML-in-SVG, so this CSS applies)
          extras_css: |
            body { background: linear-gradient(135deg,#160F08 0%,#241608 60%,#3A2408 100%) !important; color:#E8D6BE !important; }
            h2 { color:#FBBF24 !important; border-color:#78350F !important; }
            .field, .row, table, td, th, .text, p, span { color:#E8D6BE !important; }
            a { color:#F59E0B !important; }
            text { fill:#E8D6BE; }
